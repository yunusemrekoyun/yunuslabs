# Explicit project name: the deploy dir is named "app", and another tenant on
# the VPS (garden otel) was also deployed from a dir named "app" — without this,
# compose treats that container as an orphan of THIS project.
name: yunusemrekoyun-portfolio

services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: https://yunusemrekoyun.com
    image: yunusemrekoyun-portfolio-app
    container_name: yunusemrekoyun-portfolio
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_SITE_URL: https://yunusemrekoyun.com
    ports:
      - "127.0.0.1:3001:3000"
